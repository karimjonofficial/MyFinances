name: Dev APK Build

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate Private.kt
        run: |
              mkdir -p app/src/main/java/com/myfinances/core
              cat <<EOF > app/src/main/java/com/myfinances/core/Private.kt
              package com.orka.myfinances.core
          
              const val baseUrl = "${{secrets.API_BASE_URL}}"
              EOF

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Send APK to Telegram
        if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          APK_FILE=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
          if [ -z "$APK_FILE" ]; then
            echo "APK file not found!"
            exit 1
          fi
          curl -v \
            -F "chat_id=$TELEGRAM_CHAT_ID" \
            -F "document=@$APK_FILE" \
            -F "caption=🚀 New Dev Build!%0ABuild: #${{ github.run_number }}%0ABranch: ${{ github.ref_name }}%0ACommit: ${{ github.event.head_commit.message }}" \
            "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendDocument"
